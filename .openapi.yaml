openapi: 3.1.0
info:
  title: UML001 Secure Quorum Time Authority
  version: 1.0.0
  description: |
    Byzantine Fault Tolerant Secure Time Authority
    supporting HMAC, Ed25519, and TPM-sealed signing modes.

servers:
  - url: https://time.uml001.local

paths:

  /v1/time:
    get:
      summary: Get current strong time
      responses:
        '200':
          description: Strong consensus time
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimeResponse'

  /v1/state:
    get:
      summary: Get cluster consensus state
      responses:
        '200':
          description: Shared cluster state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SharedClockState'

  /v1/keys:
    get:
      summary: Get active public key
      responses:
        '200':
          description: Current signing key metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicKeyInfo'

components:

  schemas:

    TimeResponse:
      type: object
      required:
        - strong_time
        - key_version
        - signature
      properties:
        strong_time:
          type: integer
        key_version:
          type: integer
        signature:
          type: string

    SharedClockState:
      type: object
      required:
        - agreed_time
        - applied_drift
        - last_updated_unix
        - key_version
      properties:
        agreed_time:
          type: integer
        applied_drift:
          type: integer
        last_updated_unix:
          type: integer
        key_version:
          type: integer

    PublicKeyInfo:
      type: object
      required:
        - key_version
        - public_key
        - crypto_mode
      properties:
        key_version:
          type: integer
        public_key:
          type: string
        crypto_mode:
          type: string
          enum:
            - HMAC
            - ED25519
            - TPM_SEALED_ED25519