apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: securetimeclusters.uml001.io
spec:
  group: uml001.io
  names:
    kind: SecureTimeCluster
    plural: securetimeclusters
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              properties:
                members:
                  type: array
                  items:
                    type: string
                redisBackend:
                  type: string
                degradationWindowSeconds:
                  type: integer