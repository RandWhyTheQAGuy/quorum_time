syntax = "proto3";

package uml001;

// Compact binary anchor proof for runtime validation.
message AnchorProof {
  uint32 version = 1;
  bool is_merkle_root = 2;
  string observation_hash = 3;
  uint32 quorum_size = 4;
  string authority_set = 5;
  string event_id = 6;
  string event_hash = 7;
}

// Metadata for the Gossip Transport Layer
message GossipState {
  uint32 hops = 1;           // Number of nodes this message has passed through
  uint32 ttl = 2;            // Time-to-live (max hops)
  bool validated = 3;        // True if cross-verified by a peer network
  string origin_node_id = 4; // Fingerprint of the first broadcaster
}

// The core envelope for all Quorum Time and Aegis Protocol events
message SignedState {
  uint64 logical_time_ns = 1; // Anchored Quorum Time
  string event_id = 2;        // Unique identifier for the event
  bytes payload = 3;          // Serialized event data (NTP, Passport, etc.)
  bytes signature = 4;        // HMAC or Asymmetric signature
  string key_id = 5;          // ID of the key used for signing
  
  // Phase 1 Integration: Gossip metadata
  GossipState gossip = 6;     

  // Optional schema-native anchor proof envelope.
  AnchorProof anchor_proof = 7;
}