# This implementation is intended for open research, practical
# deployment, and community-driven evolution of verifiable time and
# distributed trust standards.
#
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis-clock-service
  labels:
    app: aegis-clock
spec:
  replicas: 3
  # Strategy ensures the PVC is detached from old pods before attaching to new ones
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: aegis-clock
  template:
    metadata:
      labels:
        app: aegis-clock
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        # ----------------------------------------------------------------
        # Primary container - BFT quorum clock daemon (unchanged)
        # ----------------------------------------------------------------
        - name: aegis-server
          image: yourorg/aegis-clock-server:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 50051
              name: grpc-clock
          resources:
            limits:
              cpu: "500m"
              memory: "256Mi"
            requests:
              cpu: "100m"
              memory: "128Mi"
          env:
            - name: UML001_HMAC_KEY
              valueFrom:
                secretKeyRef:
                  name: bft-clock-secrets
                  key: hmac_key
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: vault-storage
              mountPath: /var/lib/aegis/vault
          livenessProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 5
            periodSeconds: 10

        # ----------------------------------------------------------------
        # Sidecar container - consumer bridge
        # Shares the pod network so upstream is always localhost:50051.
        # Shares vault-storage so bridge audit events go to the same PVC.
        # ----------------------------------------------------------------
        - name: aegis-bridge
          image: yourorg/aegis-bridge:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: bridge-rest
            - containerPort: 8081
              name: bridge-ws
            - containerPort: 9090
              name: bridge-grpc
            - containerPort: 1123
              protocol: UDP
              name: bridge-ntp
          resources:
            limits:
              cpu: "250m"
              memory: "128Mi"
            requests:
              cpu: "50m"
              memory: "64Mi"
          env:
            - name: UML001_HMAC_KEY
              valueFrom:
                secretKeyRef:
                  name: bft-clock-secrets
                  key: hmac_key
            - name: BRIDGE_BEARER_TOKENS
              valueFrom:
                secretKeyRef:
                  name: bft-clock-secrets
                  key: bridge_bearer_tokens
                  # Create with:
                  # kubectl create secret generic bft-clock-secrets \
                  #   --from-literal=hmac_key=<key> \
                  #   --from-literal=bridge_bearer_tokens=<token1,token2>
            - name: AEGIS_DATA_DIR
              value: /var/lib/aegis/vault
            - name: BRIDGE_LOG_LEVEL
              value: INFO
            # upstream is always localhost inside the pod
            - name: AEGIS_UPSTREAM_HOST
              value: "127.0.0.1"
            - name: AEGIS_UPSTREAM_PORT
              value: "50051"
          volumeMounts:
            - name: vault-storage
              mountPath: /var/lib/aegis/vault
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10

      volumes:
        - name: vault-storage
          persistentVolumeClaim:
            claimName: bft-clock-pvc
