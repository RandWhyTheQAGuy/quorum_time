apiVersion: apps/v1
kind: Deployment
metadata:
  name: bft-clock-sidecar-demo
  labels:
    app: bft-clock-sidecar-demo
spec:
  replicas: 1
  # Use 'Recreate' to prevent two pods from trying to mount the RWO PVC at once
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: bft-clock-sidecar-demo
  template:
    metadata:
      labels:
        app: bft-clock-sidecar-demo
    spec:
      terminationGracePeriodSeconds: 30
      
      # 1. Init Container to fix permissions on the PVC
      initContainers:
        - name: init-permissions
          image: busybox:latest
          command: ["sh", "-c", "chown -R 10001:10001 /var/lib/bft-clock"]
          volumeMounts:
            - name: bft-clock-data
              mountPath: /var/lib/bft-clock

      containers:
        # ---------------------------------------------------------
        # Primary application container
        # ---------------------------------------------------------
        - name: primary-app
          image: yourorg/primary-app:latest
          ports:
            - containerPort: 8080
          env:
            - name: BFT_CLOCK_ENDPOINT
              # Sidecars communicate over 127.0.0.1
              value: "http://127.0.0.1:9090/api/v1/time"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

        # ---------------------------------------------------------
        # BFT Trusted Clock Sidecar
        # ---------------------------------------------------------
        - name: bft-clock-sidecar
          image: yourorg/bft-clock-sidecar:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 10001
            runAsGroup: 10001
          ports:
            - containerPort: 9090
              name: bft-clock
          env:
            - name: UML001_HMAC_KEY
              valueFrom:
                secretKeyRef:
                  name: bft-clock-secrets
                  key: hmac_key
            - name: BFT_MAX_DRIFT_SECONDS
              value: "3600"
            - name: BFT_SYNC_INTERVAL
              value: "60"
            # Ensure the C++ app knows where to write its vault
            - name: VAULT_PATH
              value: "/var/lib/bft-clock/vault.log"
          
          volumeMounts:
            - name: bft-clock-data
              mountPath: /var/lib/bft-clock

          resources:
            limits:
              cpu: "200m"
              memory: "128Mi"
            requests:
              cpu: "50m"
              memory: "64Mi"

          readinessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 20

      volumes:
        - name: bft-clock-data
          persistentVolumeClaim:
            claimName: bft-clock-pvc

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: bft-clock-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
apiVersion: v1
kind: Secret
metadata:
  name: bft-clock-secrets
type: Opaque
stringData:
  # Hex-encoded 256-bit key
  hmac_key: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"